<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>Ecosistema Domus Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --p1:#1a515c;--p3:#62b9c7;
  --s1:#a6a6a6;--s3:#020d14;
  --lt:#e0f2f4;--bg:#f5f9fa;--w:#fff;
  --con:#1a515c;--ban:#1a7a6a;--ges:#2a8a4a;
  --ally:#b07018;--team:#6040a8;--tech:#2060a0;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--s3)}
#wrap{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch}
#board{position:relative;transform-origin:0 0}
#board::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(26,81,92,0.04) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none}
svg.cv{position:absolute;top:0;left:0;pointer-events:none}

.orb{position:absolute;border-radius:50%;border:1px dashed rgba(98,185,199,0.1);pointer-events:none;transform:translate(-50%,-50%)}
.zone{position:absolute;border-radius:20px;pointer-events:none}

/* Section titles - pill badges, strong contrast */
.zt{position:absolute;pointer-events:none;
  font-size:16px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  padding:10px 24px;border-radius:8px;border:2px solid;white-space:nowrap}

.hl{position:absolute;pointer-events:none;
  font-size:13px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--p3);opacity:0.35}

/* Sun - BIGGER */
.sun{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:20}
.sun-c{width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle at 36% 36%,#7cd4c0,#1a515c 55%,#0d3a42);
  box-shadow:0 0 0 12px rgba(98,185,199,0.08),0 0 60px rgba(98,185,199,0.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;transition:box-shadow .3s}
.sun:hover .sun-c{box-shadow:0 0 0 16px rgba(98,185,199,0.16),0 0 80px rgba(98,185,199,0.1)}
.sun-c .s1{font-size:18px;font-weight:700;letter-spacing:5px;color:#fff}
.sun-c .s2{font-size:11px;font-weight:400;letter-spacing:2px;color:rgba(255,255,255,0.6);margin-top:3px}

/* Nodes - horizontal flex layout */
.nd{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;
  display:flex;align-items:center;gap:14px;transition:transform .2s}
.nd:hover{transform:translate(-50%,-50%) scale(1.08);z-index:50}
.nd.a-right{flex-direction:row}
.nd.a-left{flex-direction:row-reverse}
.nd.a-center{flex-direction:column;text-align:center}

.nd-dot{border-radius:50%;flex-shrink:0;transition:box-shadow .2s}
.nd:hover .nd-dot{box-shadow:0 0 0 5px color-mix(in srgb,var(--nc) 20%,transparent),0 0 14px color-mix(in srgb,var(--nc) 10%,transparent)}

.nd-info{display:flex;flex-direction:column;white-space:nowrap}
.nd.a-left .nd-info{text-align:right}
.nd.a-center .nd-info{align-items:center}

/* BIGGER TEXT across the board */
.nd-n{font-size:16px;font-weight:600;color:var(--s3);line-height:1.3}
.nd-s{font-size:13px;font-weight:400;color:#6a7580;line-height:1.4;margin-top:2px}

/* Line nodes even bigger */
.nd.line-nd .nd-n{font-size:19px;font-weight:700;color:var(--p1)}
.nd.line-nd .nd-s{font-size:14px;color:var(--p3)}

/* Accionistas */
.nd.accionista .nd-n{font-size:18px;font-weight:700;color:var(--p1)}
.nd.accionista .nd-s{font-size:13px;color:var(--p3)}

.nd.seed .nd-n{opacity:0.50}.nd.seed .nd-dot{opacity:0.45}.nd.seed .nd-s{opacity:0.45}

.fl{position:absolute;transform:translate(-50%,-50%);pointer-events:none;
  font-size:11px;font-weight:500;letter-spacing:1px;color:var(--p3);opacity:0.45;
  background:var(--bg);padding:3px 12px;border-radius:10px}
.sl{position:absolute;pointer-events:none;
  font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.22}

/* Detail */
#det{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:min(560px,94vw);
  background:var(--w);border:1px solid rgba(98,185,199,0.18);border-radius:14px;
  padding:22px 24px;z-index:600;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;transform:translateX(-50%) translateY(8px);
  box-shadow:0 8px 40px rgba(26,81,92,0.08)}
#det.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.dh{display:flex;align-items:flex-start;gap:12px}
.ddt{width:14px;height:14px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dc{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--s1)}
.dn{font-size:20px;font-weight:700;color:var(--p1)}
.dss{font-size:13px;color:var(--p3);margin-top:2px}
.dp{font-size:14px;line-height:1.7;color:#445;margin-top:12px;border-top:1px solid var(--lt);padding-top:12px}
.dx{position:absolute;top:12px;right:14px;background:none;border:1px solid var(--lt);
  width:32px;height:32px;border-radius:7px;cursor:pointer;font-size:16px;color:var(--s1);
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.dx:hover{background:var(--lt);color:var(--p1)}

#lg{position:fixed;top:14px;right:14px;z-index:600;background:var(--w);border:1px solid var(--lt);
  border-radius:12px;padding:16px 20px;box-shadow:0 2px 12px rgba(26,81,92,0.04);max-width:230px}
#lg h4{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--s1);margin-bottom:10px}
.lr{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;font-weight:500;color:var(--p1)}
.lr .lo{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lr.dm .lo{border:2px dashed #999;background:transparent}

#ti{position:fixed;top:14px;left:16px;z-index:600}
#ti h1{font-size:18px;font-weight:700;color:var(--p1);letter-spacing:1px}
#ti p{font-size:12px;color:var(--p3);margin-top:3px}

#zm{position:fixed;bottom:16px;right:14px;z-index:600;display:flex;gap:4px}
#zm button{width:42px;height:42px;border-radius:8px;border:1px solid var(--lt);background:var(--w);
  cursor:pointer;font-size:20px;color:var(--p1);display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:0 2px 8px rgba(26,81,92,0.04);touch-action:manipulation}
#zm button:hover,#zm button:active{background:var(--lt);border-color:var(--p3)}

@media(max-width:768px){
  #lg{top:auto;bottom:76px;right:8px;padding:10px 14px;max-width:180px}
  .lr{font-size:12px}
  #ti h1{font-size:15px}
  #det{bottom:12px;padding:16px 18px}
  .dn{font-size:17px}.dp{font-size:13px}
  #zm button{width:38px;height:38px}
}
</style>
</head>

  <div class="lr"><span class="lo" style="background:#62b9c7"></span>Accionistas</div>
  <div class="lr"><span class="lo" style="background:var(--con)"></span>Consultoría</div>
  <div class="lr"><span class="lo" style="background:var(--ban)"></span>Banca de inversión</div>

  <div class="lr"><span class="lo" style="background:var(--tech)"></span>Stack AI-First</div>
  <div class="lr dm"><span class="lo"></span>Deal seed</div>
</div>
<div id="zm">
  <button onclick="doZoom(-1)">−</button>
  <button onclick="doZoom(0)">◎</button>
  <button onclick="doZoom(1)">+</button>
</div>
<div id="det">
  <button class="dx" onclick="cl()">✕</button>
  <div class="dh"><span class="ddt" id="xd"></span><div><div class="dc" id="xc"></div><div class="dn" id="xn"></div><div class="dss" id="xs"></div></div></div>
  <div class="dp" id="xp"></div>
</div>
<div id="wrap">
<div id="board">
<svg class="cv" id="sv"></svg>
</div>

function calcSc(){return Math.min(window.innerWidth/BW,window.innerHeight/BH,0.8)}
function applySc(s){
  sc=Math.max(0.25,Math.min(1.5,s));
  B.style.width=BW*sc+'px';B.style.height=BH*sc+'px';
  B.style.transform=`scale(${sc})`;B.style.transformOrigin='0 0';
  SV.setAttribute('viewBox',`0 0 ${BW} ${BH}`);
  SV.style.width=BW+'px';SV.style.height=BH+'px';
}
function centerV(){WR.scrollLeft=CX*sc-window.innerWidth/2;WR.scrollTop=CY*sc-window.innerHeight/2}
function doZoom(d){if(d===0)applySc(calcSc());else applySc(sc+(d>0?0.15:-0.15));centerV()}

addST(2100,790,'Equipo operativo','#6040a8');
addST(2100,1390,'Stack AI-First','#2060a0');

function addHL(l,t,txt){const d=document.createElement('div');d.className='hl';d.textContent=txt;d.style.cssText=`left:${l}px;top:${t}px`;B.appendChild(d)}
addHL(450,130,'Líneas de negocio & pipeline');
addHL(2400,130,'Capacidades & red');

function addSL(l,t,txt,c){const d=document.createElement('div');d.className='sl';d.textContent=txt;d.style.cssText=`left:${l}px;top:${t}px;color:${c};transform:translate(-50%,-50%)`;B.appendChild(d)}
addSL(290,930,'Activos','#1a7a6a');
addSL(620,930,'Seed','#1a7a6a');

[200,420].forEach(r=>{const d=document.createElement('div');d.className='orb';d.style.cssText=`left:${CX}px;top:${CY}px;width:${r*2}px;height:${r*2}px`;B.appendChild(d)});

const vl=document.createElementNS(NS,'line');
vl.setAttribute('x1',CX);vl.setAttribute('y1',60);vl.setAttribute('x2',CX);vl.setAttribute('y2',BH-60);
vl.setAttribute('stroke','rgba(98,185,199,0.06)');vl.setAttribute('stroke-width','1');vl.setAttribute('stroke-dasharray','6 8');
SV.appendChild(vl);

function gp(id){if(id==='sun')return{x:CX,y:CY};const n=ND.find(d=>d.id===id);return n||{x:CX,y:CY}}
CN.forEach(([f,t,c,w,s])=>{
  const a=gp(f),b=gp(t),l=document.createElementNS(NS,'line');
  l.setAttribute('x1',a.x);l.setAttribute('y1',a.y);l.setAttribute('x2',b.x);l.setAttribute('y2',b.y);
  l.setAttribute('stroke',c);l.setAttribute('stroke-width',w);l.setAttribute('stroke-opacity',0.14);
  if(s==='d')l.setAttribute('stroke-dasharray','8 5');
  SV.appendChild(l);
});

function addFL(l,t,txt){const d=document.createElement('div');d.className='fl';d.textContent=txt;d.style.cssText=`left:${l}px;top:${t}px`;B.appendChild(d)}
addFL(440,740,'funnel ↓');
addFL(440,1340,'funnel ↓');

const sun=document.createElement('div');sun.className='sun';sun.style.cssText=`left:${CX}px;top:${CY}px`;
sun.innerHTML='<div class="sun-c"><span class="s1">DOMUS</span><span class="s2">CAPITAL</span></div>';
sun.onclick=()=>sd({nm:'Domus Capital',sb:'Banca de inversión inmobiliaria & estructuración financiera',
  ds:'Tres líneas como funnel: consultoría → banca → gestión de capital. +USD 1Bn estructurados · 350K m² · 6K+ unidades · USD 800M+ transacciones.',cat:'acc'});
B.appendChild(sun);

ND.forEach(n=>{
  const c=CC[n.cat];if(!c)return;
  const al=n.al||'right';
  const el=document.createElement('div');
  el.className='nd a-'+al+(n.seed?' seed':'')+(n.cls?' '+n.cls:'');
  el.style.cssText=`left:${n.x}px;top:${n.y}px;--ds:${n.sz}px;--nc:${c.c}`;
  const dot=document.createElement('div');dot.className='nd-dot';
  dot.style.cssText=`width:${n.sz}px;height:${n.sz}px;background:${c.c};box-shadow:0 0 0 3px ${c.c}18`;
  el.appendChild(dot);
  const info=document.createElement('div');info.className='nd-info';
  info.innerHTML=`<div class="nd-n">${n.nm}</div>${n.sb?`<div class="nd-s">${n.sb}</div>`:''}`;
  el.appendChild(info);
  el.addEventListener('click',()=>sd(n));
  B.appendChild(el);
});

function sd(n){
  const c=CC[n.cat]||CC.acc;
  document.getElementById('xd').style.background=c.c;
  document.getElementById('xc').textContent=c.n;document.getElementById('xc').style.color=c.c;
  document.getElementById('xn').textContent=n.nm;
  document.getElementById('xs').textContent=n.sb||'';
  document.getElementById('xp').textContent=n.ds||'';
  document.getElementById('det').classList.add('show');
}
function cl(){document.getElementById('det').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cl()});

let dr=false,sx,sy,lx,ly;
WR.addEventListener('mousedown',e=>{if(e.target.closest('.nd,.sun,#det,#lg,#zm'))return;dr=true;sx=e.pageX;sy=e.pageY;lx=WR.scrollLeft;ly=WR.scrollTop});
document.addEventListener('mousemove',e=>{if(!dr)return;WR.scrollLeft=lx-(e.pageX-sx);WR.scrollTop=ly-(e.pageY-sy)});
document.addEventListener('mouseup',()=>{dr=false});
let ts=null;
WR.addEventListener('touchstart',e=>{if(e.target.closest('.nd,.sun,#det,#lg,#zm'))return;if(e.touches.length===1){ts={x:e.touches[0].pageX,y:e.touches[0].pageY,sl:WR.scrollLeft,st:WR.scrollTop}}},{passive:true});
WR.addEventListener('touchmove',e=>{if(!ts||e.touches.length!==1)return;WR.scrollLeft=ts.sl-(e.touches[0].pageX-ts.x);WR.scrollTop=ts.st-(e.touches[0].pageY-ts.y)},{passive:true});
WR.addEventListener('touchend',()=>{ts=null});
let lpd=0;
WR.addEventListener('touchstart',e=>{if(e.touches.length===2)lpd=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY)},{passive:true});
WR.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY);if(lpd>0)applySc(sc+(d-lpd)*0.003);lpd=d}},{passive:true});
WR.addEventListener('touchend',e=>{if(e.touches.length<2)lpd=0});

applySc(calcSc());
setTimeout(centerV,80);
window.addEventListener('resize',()=>{applySc(calcSc());centerV()});
</script>
</body>
</html>
